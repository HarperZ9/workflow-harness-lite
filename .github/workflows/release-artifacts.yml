name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Test
        run: npm test
      - name: Build package artifact
        run: npm pack
      - uses: actions/upload-artifact@v5
        with:
          name: workflow-harness-lite-npm-package
          path: workflow-harness-lite-*.tgz
